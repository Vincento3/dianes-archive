  <!DOCTYPE html>
  <html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diane's Archive 🌸</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Gochi+Hand&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dayan.css">
  <link rel="icon" type="image/jpg" href="photos/Scaramouche.jpg">
  </head>
  <body>

  <div class="sparkle-field" aria-hidden="true">
    <span class="sparkle" style="top:8%; left:6%; animation-delay:0s;">✨</span>
    <span class="sparkle" style="top:18%; left:88%; animation-delay:1.2s;">💗</span>
    <span class="sparkle" style="top:60%; left:3%; animation-delay:2.1s;">⭐</span>
    <span class="sparkle" style="top:75%; left:92%; animation-delay:0.6s;">✨</span>
    <span class="sparkle" style="top:40%; left:50%; animation-delay:1.8s;">💫</span>
  </div>

  <div class="frame">
    <div class="header">
      <div class="sticker-slot top-left" id="sticker-1"></div>
      <div class="sticker-slot top-right" id="sticker-2"></div>
      <p class="eyebrow">sorry sa headset 🥺🥺🥺</p>
      <h1 id="board-title">Diane Overload 🌸</h1>
      <p class="sub"></p>
    </div>

    <div class="view-toggle">
      <button id="btn-pile" class="active">piled up</button>
      <button id="btn-lined">lined up</button>
    </div>

    <div class="board">
      <div class="pins-grid pile" id="pins-grid"></div>
    </div>
  </div>

  
  <div class="modal-backdrop lightbox" id="lb-backdrop">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="lb-photo-wrap">
        <img class="lb-photo" id="lb-photo" src="" alt="">
      </div>
      <div class="lb-date" id="lb-date"></div>
      <div class="lb-note-display" id="lb-note-text"></div>
      <div class="lb-row" style="margin-top:18px; justify-content:center;">
        <button class="btn-ghost" id="lb-close">Close</button>
      </div>
    </div>
  </div>

  <script src="memories.js"></script>
  <script src="dayan.js"></script>
  </body>
  </html>
